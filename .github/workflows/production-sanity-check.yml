name: Sovereign Sanity Check

on:
  deployment_status:
  push:
    branches: [ main, master ]

jobs:
  verify:
    if: github.event_name == 'push' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run Sanity Check
        run: node scripts/verify-production.cjs
        env:
          PRODUCTION_URL: 'https://kortx.ca'
