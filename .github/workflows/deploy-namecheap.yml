name: Deploy to Namecheap (Stellar Static Hosting)

on:
  push:
    branches:
      - main  # Trigger on push to main branch

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        
      - name: Build Vite App
        run: npm run build
        
      - name: Sync /dist to Namecheap via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.NAMECHEAP_FTP_SERVER }}
          username: ${{ secrets.NAMECHEAP_FTP_USER }}
          password: ${{ secrets.NAMECHEAP_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/v1.1/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
