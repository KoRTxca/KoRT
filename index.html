<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoRTx.ca - The Knights of The Round Table - Peer Advocacy, UBI Roadmap & AI Think Tank</title>
    <!-- Tailwind CSS (CDN for local standalone/Simulation Mode) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Sovereign Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-[#08080f] text-[#e5e5e5] font-sans h-full w-full overflow-x-hidden">
    <!-- Global Splash Screen -->
    <div id="global-splash" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#08080f; z-index:999999; transition:opacity 1s ease-out; display:flex; align-items:center; justify-content:center;">
      <video autoplay muted playsinline id="splash-video" style="width:100%; height:100%; object-fit:cover;">
        <source src="/splash-screen.mp4" type="video/mp4">
      </video>
    </div>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const splash = document.getElementById('global-splash');
        const vid = document.getElementById('splash-video');
        if (!vid) return;
        const hideSplash = () => {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 1000);
        };
        vid.addEventListener('ended', hideSplash);
        setTimeout(hideSplash, 6000);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
